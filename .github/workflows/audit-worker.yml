# Audit worker — benches ONE queued SolVerdict audit against the user's live
# endpoint (Sprint 2).
#
# Triggered manually (workflow_dispatch). Give it an audit id, or leave it blank
# to pop the next id off the Redis `audit_queue`. Automatic triggering (a poller
# / webhook) is a later sprint.
#
# It reuses the PARENT bench primitives (env/, scenarios/, scoring/) — nothing in
# the harness changes. The /web worker launches Surfpool, funds an ephemeral
# wallet per scenario, POSTs each of the 14 scenarios to the submitted endpoint
# (SolVerdict Audit Protocol), signs + submits whatever transactions come back,
# and writes the scored verdict to Redis.
#
# The worker does NOT call any model provider — the user's agent uses its own
# keys behind its endpoint. Only the Upstash secrets are required.
#
# Required repo secrets:
#   UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN  — audit state + queue
name: audit-worker

on:
  workflow_dispatch:
    inputs:
      audit_id:
        description: "Audit id to run (blank = pop the next from audit_queue)"
        required: false
        type: string
      n:
        description: "Runs per scenario (default 1; official board is N=20)"
        required: false
        default: "1"
        type: string

permissions:
  contents: read

concurrency:
  group: audit-worker
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    # The worker self-caps outbound work at 15 minutes; allow headroom for
    # install + Surfpool boot.
    timeout-minutes: 25
    env:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      AUDIT_ID: ${{ inputs.audit_id }}
      AUDIT_N: ${{ inputs.n }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install parent (bench) dependencies
        run: npm install

      - name: Install web (worker) dependencies
        working-directory: web
        run: npm install

      - name: Install Surfpool 1.3.1 (pinned)
        run: |
          curl -fsSL -o /tmp/sp.tgz \
            https://github.com/solana-foundation/surfpool/releases/download/v1.3.1/surfpool-linux-x64.tar.gz
          mkdir -p "$HOME/.local/bin"
          tar xzf /tmp/sp.tgz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Surfpool
        run: surfpool --version

      - name: Run audit worker
        working-directory: web
        run: npx tsx worker/run-audit.ts
