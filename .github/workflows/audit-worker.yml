# Audit worker — drains the SolVerdict audit queue and benches each submission
# against its live endpoint (Sprint 3).
#
# Runs automatically every 5 minutes (cron) and can still be dispatched manually.
# Each run (Sprint 4) does ONE unit of work: resolve stuck payments, sweep
# retry-due shards back onto the queue, then process a single paid shard (4
# scenarios × N=20) or a single free audit. Paid audits resume across ticks;
# failed shards retry with exponential backoff. See web/worker/run-audit.ts.
#
# It reuses the PARENT bench primitives (env/, scenarios/, scoring/) — nothing in
# the harness changes.
#
# Required repo secrets:
#   UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN  — audit state + queue
#   SOLVERDICT_PAYMENT_WALLET                         — USDC payment destination
#   SOLANA_RPC_URL (optional)                         — mainnet RPC for payment verify
#   RESEND_API_KEY (optional)                         — email notifications
name: audit-worker

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch:
    inputs:
      audit_id:
        description: "Run just this audit id (blank = drain the queue)"
        required: false
        type: string

permissions:
  contents: read

# Never let two worker runs overlap; a running job makes the next tick wait.
concurrency:
  group: audit-worker
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    # The worker self-caps a shard at 12 minutes; 14 keeps a safety buffer under
    # the practical GitHub job budget while the next cron tick handles the rest.
    timeout-minutes: 14
    env:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      SOLVERDICT_PAYMENT_WALLET: ${{ secrets.SOLVERDICT_PAYMENT_WALLET }}
      SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
      AUDIT_ID: ${{ inputs.audit_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install parent (bench) dependencies
        run: npm install

      - name: Install web (worker) dependencies
        working-directory: web
        run: npm install

      - name: Install Surfpool 1.3.1 (pinned)
        run: |
          curl -fsSL -o /tmp/sp.tgz \
            https://github.com/solana-foundation/surfpool/releases/download/v1.3.1/surfpool-linux-x64.tar.gz
          mkdir -p "$HOME/.local/bin"
          tar xzf /tmp/sp.tgz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Surfpool
        run: surfpool --version

      - name: Run audit worker
        working-directory: web
        run: npx tsx worker/run-audit.ts
