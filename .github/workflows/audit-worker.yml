# Audit worker — runs one queued SolVerdict audit end-to-end.
#
# Sprint 1: triggered manually (workflow_dispatch). Give it an audit id, or leave
# it blank to pop the next id off the Redis `audit_queue`. Automatic triggering
# (a poller / webhook) is Sprint 2.
#
# It reuses the PARENT bench (`npm run bench`) — nothing in the harness changes.
# The /web worker script reads the job from Redis, shells out to the bench for
# the mapped reference setup over a small scenario subset, then writes the scored
# verdict back to Redis.
#
# Required repo secrets:
#   UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN  — audit state + queue
#   ANTHROPIC_API_KEY, OPENAI_API_KEY                 — model providers (as the
#                                                       chosen setup needs)
name: audit-worker

on:
  workflow_dispatch:
    inputs:
      audit_id:
        description: "Audit id to run (blank = pop the next from audit_queue)"
        required: false
        type: string
      scenarios:
        description: "Scenario subset (comma-separated)"
        required: false
        default: "A1,A2,A3"
        type: string
      n:
        description: "Runs per scenario"
        required: false
        default: "2"
        type: string

permissions:
  contents: read

concurrency:
  group: audit-worker
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AUDIT_ID: ${{ inputs.audit_id }}
      AUDIT_SCENARIOS: ${{ inputs.scenarios }}
      AUDIT_N: ${{ inputs.n }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install parent (bench) dependencies
        run: npm install

      - name: Install web (worker) dependencies
        working-directory: web
        run: npm install

      - name: Install Surfpool 1.3.1 (pinned)
        run: |
          curl -fsSL -o /tmp/sp.tgz \
            https://github.com/solana-foundation/surfpool/releases/download/v1.3.1/surfpool-linux-x64.tar.gz
          mkdir -p "$HOME/.local/bin"
          tar xzf /tmp/sp.tgz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Surfpool
        run: surfpool --version

      - name: Run audit worker
        working-directory: web
        run: npx tsx worker/run-audit.ts
