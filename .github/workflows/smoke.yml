# Smoke CI — proves the harness still runs end-to-end on every PR to main.
# No API keys: the smoke uses the deterministic, model-free `selftest-scripted`
# setup. It does need the Surfpool 1.3.1 binary (the bench launches it) and
# outbound network to the fork datasource — both available on GitHub runners.
name: smoke

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Surfpool 1.3.1 (pinned)
        run: |
          curl -fsSL -o /tmp/sp.tgz \
            https://github.com/solana-foundation/surfpool/releases/download/v1.3.1/surfpool-linux-x64.tar.gz
          mkdir -p "$HOME/.local/bin"
          tar xzf /tmp/sp.tgz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Surfpool
        run: surfpool --version

      - name: Lint (RPC lock) + typecheck + unit tests
        run: npm test

      - name: Smoke bench (deterministic selftest-scripted, no API keys)
        run: npm run bench:smoke
